<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parking LED — PRAÇA LISBOA (PT751)</title>
  <style>
    body { margin:0; font-family: system-ui, Arial, sans-serif; background:#000; color:#fff; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { text-align:center; padding:6vh 6vw; }
    .park { font-size:5vw; font-weight:900; letter-spacing:0.02em; }
    .free { margin-top:3vh; font-size:14vw; font-weight:900; }
    .label { font-size:3vw; opacity:0.85; margin-top:1vh; }
    .meta { margin-top:3vh; font-size:2.5vw; opacity:0.7; }
    .err { color:#ff6b6b; font-size:3vw; margin-top:2vh; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="park" id="parkName">A carregar…</div>
      <div class="free" id="freeSpots">—</div>
      <div class="label">lugares livres</div>
      <div class="meta" id="updated">A atualizar…</div>
      <div class="err" id="error" style="display:none;"></div>
    </div>
  </div>

<script>
  const PARK_CODE = "PT751";
  const REFRESH_MS = 5000;

  const url = new URL("https://saba.opendatasoft.com/api/explore/v2.1/catalog/datasets/pt_carga-aparcamientos/records");
  url.searchParams.set("limit", "1");
  url.searchParams.set("where", `regimen_operativo="${PARK_CODE}"`);

  const elFree = document.getElementById("freeSpots");
  const elUpdated = document.getElementById("updated");
  const elError = document.getElementById("error");
  const elPark = document.getElementById("parkName");

  function showError(msg) { elError.style.display = "block"; elError.textContent = msg; }
  function clearError() { elError.style.display = "none"; elError.textContent = ""; }

  async function refresh() {
    try {
      clearError();

      // Evitar cache (útil em controladoras/LED browsers)
      const res = await fetch(url.toString(), { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const r = data.results?.[0];
      if (!r) throw new Error("Sem resultados para este parque");

      elPark.textContent = `${r.aparcamiento_desc ?? "Parque"} (${PARK_CODE})`;
      elFree.textContent = (r.plazas ?? "—");
      elUpdated.textContent = `Atualizado: ${r.hora ?? new Date().toISOString()} | refresh: 5s`;
    } catch (e) {
      showError("Erro a obter dados: " + e.message);
      elUpdated.textContent = `Última tentativa: ${new Date().toLocaleString()} | refresh: 5s`;
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
