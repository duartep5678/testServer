<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parque PT751</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            text-align: center;
            min-width: 350px;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .livres {
            font-size: 72px;
            font-weight: bold;
            color: #28a745;
            margin: 20px 0;
        }

        .ocupacao {
            font-size: 32px;
            color: #555;
        }

        .updated {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }

        .error {
            color: red;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Parque PT751</h1>

    <div class="livres" id="livres">--</div>

    <div class="ocupacao" id="ocupacao">--</div>

    <div class="updated" id="updated">
        A carregar...
    </div>
</div>

<script>

const API_KEY = "b1437a4817312933612f3fc7d415b728f45d32ae0d7ba5bf1f3e42e1";

const API_URL =
`https://saba.opendatasoft.com/api/explore/v2.1/catalog/datasets/pt_carga-aparcamientos/records?select=nombre%2C%20aparcamiento_desc%2C%20localidad%2C%20sociedad%2C%20plazas%2C%20porcentaje_de_ocupacion&where=nombre%20%3D%20%22PT757%22&limit=10&offset=0&timezone=UTC&include_links=false&include_app_metas=false&apikey=${API_KEY}`;


async function carregarDados() {

    try {

        const response = await fetch(API_URL);

        if (!response.ok) {
            throw new Error("Erro na API");
        }

        const data = await response.json();

        if (!data.results || data.results.length === 0) {
            throw new Error("Sem resultados");
        }

        const parque = data.results[0];

        document.getElementById("livres").textContent =
            `${parque.plazas} lugares livres`;

        document.getElementById("ocupacao").textContent =
            `${parque.porcentaje_de_ocupacion}% ocupado`;

        document.getElementById("updated").textContent =
            `Atualizado às ${new Date().toLocaleTimeString("pt-PT")}`;

    } catch (error) {

        console.error(error);

        document.getElementById("livres").innerHTML =
            '<span class="error">Erro ao carregar</span>';

        document.getElementById("ocupacao").textContent = "";
    }
}

carregarDados();

// Atualiza a cada 30 segundos
setInterval(carregarDados, 30000);

</script>

</body>
</html>
