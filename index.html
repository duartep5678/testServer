<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parque PT751</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        .card {
            max-width: 500px;
            margin: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
        }

        .livres {
            font-size: 48px;
            font-weight: bold;
            color: green;
        }

        .ocupacao {
            font-size: 24px;
        }

        .atualizacao {
            margin-top: 15px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Parque PT751</h1>

    <div id="nome"></div>

    <div class="livres" id="livres">--</div>

    <div class="ocupacao" id="ocupacao">--</div>

    <div class="atualizacao" id="atualizacao"></div>
</div>

<script>

const API_KEY = "b1437a4817312933612f3fc7d415b728f45d32ae0d7ba5bf1f3e42e1";

const URL =
`https://saba.opendatasoft.com/api/explore/v2.1/catalog/datasets/pt_carga-aparcamientos/records?select=aparcamiento_desc,localidad,sociedad,plazas,porcentaje_de_ocupacion&where=nombre%20%3D%20%22PT751%22&limit=10&offset=0&timezone=UTC&include_links=false&include_app_metas=false&apikey=${API_KEY}`;

async function atualizar() {

    try {

        const response = await fetch(URL);

        const data = await response.json();

        const parque = data.results[0];

        const total = parque.plazas;
        const ocupacao = parque.porcentaje_de_ocupacion;

        const livres = Math.round(
            total * (100 - ocupacao) / 100
        );

        document.getElementById("nome").textContent =
            parque.aparcamiento_desc;

        document.getElementById("livres").textContent =
            livres + " lugares livres";

        document.getElementById("ocupacao").textContent =
            ocupacao + "% ocupado";

        document.getElementById("atualizacao").textContent =
            "Atualizado: " + new Date().toLocaleTimeString();

    } catch (err) {

        console.error(err);

        document.getElementById("livres").textContent =
            "Erro ao obter dados";
    }
}

atualizar();

setInterval(atualizar, 30000);

</script>

</body>
</html>
